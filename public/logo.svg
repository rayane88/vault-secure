<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="96" ry="96" fill="url(#bgGrad)" />
  
  <!-- Subtle inner highlight -->
  <rect x="48" y="48" width="416" height="416" rx="84" ry="84" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="4" />
  
  <!-- Shield body -->
  <path d="M256 140 
           C256 140, 340 170, 340 170 
           C340 170, 340 280, 340 280 
           C340 340, 300 380, 256 400 
           C212 380, 172 340, 172 280 
           C172 280, 172 170, 172 170 
           C172 170, 256 140, 256 140 Z" 
        fill="white" opacity="0.95" />
  
  <!-- Shield inner shadow/detail -->
  <path d="M256 155 
           C256 155, 325 180, 325 180 
           C325 180, 325 275, 325 275 
           C325 325, 290 360, 256 375 
           C222 360, 187 325, 187 275 
           C187 275, 187 180, 187 180 
           C187 180, 256 155, 256 155 Z" 
        fill="none" stroke="rgba(59,130,246,0.2)" stroke-width="3" />
  
  <!-- Lock body (centered) -->
  <rect x="224" y="240" width="64" height="56" rx="8" ry="8" fill="#3B82F6" />
  
  <!-- Lock shackle -->
  <path d="M240 240 L240 220 
           C240 200, 248 192, 256 192 
           C264 192, 272 200, 272 220 
           L272 240" 
        fill="none" stroke="#3B82F6" stroke-width="12" stroke-linecap="round" />
  
  <!-- Keyhole -->
  <circle cx="256" cy="268" r="8" fill="white" />
  <rect x="252" y="268" width="8" height="16" rx="2" ry="2" fill="white" />
</svg>
